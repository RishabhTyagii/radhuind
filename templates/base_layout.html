<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Radhu Industries{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Custom scrollbar and glassmorphism */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 8px; }
        .glass-nav {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .nav-link {
            transition: all 0.2s ease;
        }
        .nav-link:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-1px);
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.2);
        }
        /* Message animations */
        .message-animate {
            animation: slideDown 0.4s ease;
        }
        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-slate-100 to-slate-200 min-h-screen text-slate-800 font-sans">

{% if user.is_authenticated %}
<nav class="glass-nav text-white sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <!-- Logo -->
            <a href="{% url 'home' %}" class="flex items-center gap-2 font-bold text-xl tracking-tight">
                <i class="fas fa-industry text-cyan-400"></i>
                <span class="bg-gradient-to-r from-white to-slate-300 bg-clip-text text-transparent">Radhu Industries</span>
            </a>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center gap-1 text-sm font-medium">
                {% block nav_desktop %}{% endblock %}
            </div>

            <!-- User & Logout -->
            <div class="flex items-center gap-4">
                <span class="hidden sm:inline text-slate-300 text-sm font-medium border-r border-slate-600 pr-4">
                    <i class="fas fa-user-circle mr-2"></i>{{ user.username }}
                </span>
                <a href="{% url 'logout' %}" class="flex items-center gap-2 px-4 py-2 rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-300 hover:text-red-200 transition-all">
                    <i class="fas fa-sign-out-alt"></i>
                    <span class="hidden sm:inline">Logout</span>
                </a>
            </div>
        </div>

        <!-- Mobile Menu -->
        <div class="md:hidden pb-3 flex flex-wrap gap-2 text-sm">
            {% block nav_mobile %}{% endblock %}
        </div>
    </div>
</nav>
{% endif %}

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% if messages %}
        {% for message in messages %}
            <div class="mb-6 px-5 py-4 rounded-xl shadow-md text-sm font-medium flex items-center gap-3 message-animate
                {% if message.tags == 'error' %}
                    bg-red-50 text-red-700 border-l-4 border-red-500
                {% else %}
                    bg-emerald-50 text-emerald-700 border-l-4 border-emerald-500
                {% endif %}
            ">
                <i class="fas {% if message.tags == 'error' %}fa-exclamation-circle{% else %}fa-check-circle{% endif %} text-lg"></i>
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>

<!-- PWA Install Button (Floating) -->

    <i class="fas fa-download"></i> Install App
</button> -->

<!-- Service Worker Registration -->
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/service-worker.js')
        .then(reg => console.log('ServiceWorker registered', reg))
        .catch(err => console.log('ServiceWorker registration failed:', err));
    });
}
</script>

<!-- PWA Installation Handler -->
<script>
let deferredPrompt;
const installBtn = document.getElementById('installBtn');

window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'flex';
});

installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) {
        if (window.matchMedia('(display-mode: standalone)').matches) {
            alert("✅ App already installed!");
        } else {
            alert("⚠️ PWA installation not supported");
        }
        return;
    }
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    console.log('User choice:', outcome);
    installBtn.style.display = 'none';
    deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
    console.log('PWA installed');
    installBtn.style.display = 'none';
});

// Hide if already standalone
if (window.matchMedia('(display-mode: standalone)').matches) {
    installBtn.style.display = 'none';
}
</script>

</body>
</html>
