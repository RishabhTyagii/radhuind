{% extends "stock/base.html" %}
{% block content %}
{% load static %}
<style>
    /* FULL-SCREEN BACKGROUND */
    .login-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 40%, #0f172a 100%);
        z-index: 9999;
    }

    /* Animated gradient orbs - bigger for full effect */
    .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        animation: orbFloat 10s ease-in-out infinite alternate;
        pointer-events: none;
    }
    .orb-1 {
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(59,130,246,0.35), transparent);
        top: -20%;
        left: -20%;
        animation-delay: 0s;
    }
    .orb-2 {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(139,92,246,0.3), transparent);
        bottom: -20%;
        right: -20%;
        animation-delay: 2s;
    }
    .orb-3 {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, rgba(236,72,153,0.2), transparent);
        top: 40%;
        left: 40%;
        animation-delay: 4s;
    }
    .orb-4 {
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(251,191,36,0.15), transparent);
        top: 60%;
        left: 10%;
        animation-delay: 6s;
    }

    @keyframes orbFloat {
        0% { transform: translate(0, 0) scale(1); }
        25% { transform: translate(50px, -30px) scale(1.15); }
        50% { transform: translate(-30px, 40px) scale(0.9); }
        75% { transform: translate(40px, 20px) scale(1.05); }
        100% { transform: translate(-20px, -40px) scale(1.1); }
    }

    /* Glass card - centered perfectly */
    .glass-card {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.6);
        transition: all 0.4s ease;
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 460px;
        padding: 48px 40px;
        margin: 20px;
    }
    .glass-card:hover {
        transform: translateY(-6px) scale(1.01);
        box-shadow: 0 40px 80px -15px rgba(0, 0, 0, 0.7);
        border-color: rgba(255, 255, 255, 0.2);
    }

    /* Neon border glow with rotation */
    .glass-card::before {
        content: '';
        position: absolute;
        inset: -3px;
        border-radius: 28px;
        background: linear-gradient(135deg, rgba(59,130,246,0.4), rgba(139,92,246,0.4), rgba(236,72,153,0.3), rgba(59,130,246,0.2));
        z-index: -1;
        opacity: 0.5;
        animation: borderGlow 5s ease-in-out infinite alternate;
        background-size: 300% 300%;
    }
    @keyframes borderGlow {
        0% { opacity: 0.3; filter: blur(1px); background-position: 0% 50%; }
        50% { opacity: 0.7; filter: blur(2px); background-position: 100% 50%; }
        100% { opacity: 0.3; filter: blur(1px); background-position: 0% 50%; }
    }

    /* RECTANGULAR LOGO - properly sized */
    .logo-container {
        width: 180px;
        height: 100px;
        margin: 0 auto 18px;
        /* background: rgba(255, 255, 255, 0.05); */
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        /* border: 1px solid rgba(255, 255, 255, 0.15); */
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
    }
    .logo-container:hover {
        border-color: rgba(59,130,246,0.4);
        background: rgba(255, 255, 255, 0.08);
        transform: scale(1.02);
    }
    .logo-container img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 6px;
        border-radius: 12px;
    }

    /* Title with glow effect */
    .title-glow {
        text-shadow: 0 0 30px rgba(59,130,246,0.15);
        letter-spacing: 0.5px;
    }

    /* Floating particles - more and larger */
    .particle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        pointer-events: none;
        animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
        0% { transform: translateY(100vh) rotate(0deg) scale(0); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.8; }
        100% { transform: translateY(-10vh) rotate(720deg) scale(1.2); opacity: 0; }
    }

    /* Premium Input Fields */
    .login-input {
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 16px 18px 16px 48px;
        color: white;
        width: 100%;
        transition: all 0.3s ease;
        font-size: 15px;
        outline: none;
        font-weight: 400;
    }
    .login-input:focus {
        border-color: rgba(59,130,246,0.6);
        background: rgba(255, 255, 255, 0.12);
        box-shadow: 0 0 30px rgba(59,130,246,0.08);
    }
    .login-input::placeholder {
        color: rgba(255, 255, 255, 0.35);
        font-weight: 300;
    }
    .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: rgba(255, 255, 255, 0.25);
        transition: all 0.3s ease;
        font-size: 16px;
    }
    .input-group:focus-within .input-icon {
        color: rgba(59,130,246,0.7);
        transform: translateY(-50%) scale(1.1);
    }

    /* Premium Login Button with pulse effect */
    .login-btn {
        background: linear-gradient(135deg, #2563eb, #7c3aed, #ec4899);
        background-size: 200% 200%;
        border: none;
        border-radius: 16px;
        padding: 18px;
        color: white;
        font-weight: 600;
        font-size: 16px;
        width: 100%;
        cursor: pointer;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 25px rgba(59,130,246,0.3);
        animation: gradientMove 4s ease-in-out infinite;
    }
    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    .login-btn:hover {
        transform: translateY(-3px) scale(1.02);
        box-shadow: 0 8px 40px rgba(59,130,246,0.4);
    }
    .login-btn:active {
        transform: scale(0.97);
    }
    .login-btn::after {
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(45deg, transparent, rgba(255,255,255,0.15), transparent);
        transform: rotate(45deg);
        animation: btnShine 4s ease-in-out infinite;
    }
    @keyframes btnShine {
        0% { transform: translateX(-100%) rotate(45deg); }
        100% { transform: translateX(100%) rotate(45deg); }
    }

    /* Pulse ring on button */
    .login-btn::before {
        content: '';
        position: absolute;
        inset: -4px;
        border-radius: 16px;
        background: linear-gradient(135deg, #2563eb, #7c3aed, #ec4899);
        z-index: -1;
        opacity: 0;
        animation: pulseRing 3s ease-in-out infinite;
        filter: blur(10px);
    }
    @keyframes pulseRing {
        0%, 100% { opacity: 0; transform: scale(1); }
        50% { opacity: 0.3; transform: scale(1.05); }
    }

    /* Error message with premium look */
    .error-box {
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.25);
        border-radius: 14px;
        padding: 14px 18px;
        color: #fca5a5;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        backdrop-filter: blur(8px);
        animation: errorShake 0.5s ease;
    }
    @keyframes errorShake {
        0%, 100% { transform: translateX(0); }
        20% { transform: translateX(-10px); }
        40% { transform: translateX(10px); }
        60% { transform: translateX(-6px); }
        80% { transform: translateX(6px); }
    }

    /* Auth badge - premium */
    .auth-badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.15);
        padding: 6px 18px;
        border-radius: 25px;
        font-size: 11px;
        color: #fca5a5;
        letter-spacing: 0.8px;
        font-weight: 600;
        margin-top: 24px;
        text-transform: uppercase;
    }
    .auth-badge i {
        font-size: 13px;
        animation: shieldPulse 2s ease-in-out infinite;
    }
    @keyframes shieldPulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; transform: scale(1.1); }
    }

    /* Responsive */
    @media (max-width: 640px) {
        .glass-card {
            padding: 32px 24px;
            margin: 16px;
            max-width: 100%;
        }
        .logo-container {
            width: 120px;
            height: 56px;
        }
        .orb-1 { width: 300px; height: 300px; }
        .orb-2 { width: 250px; height: 250px; }
        .orb-3 { width: 200px; height: 200px; }
        .orb-4 { width: 150px; height: 150px; }
    }
</style>

<!-- Particle container (generated by JS) -->
<div id="particles-container" style="position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0;"></div>

<div class="login-container">
    <!-- Animated Gradient Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>

    <!-- Premium Login Card -->
    <div class="glass-card">
        <!-- Rectangular Logo Area -->
        <div class="logo-container">
            <img style="border-radius: 0.5rem;" src="{% static 'icon/radhulogo.png' %}" alt="Radhu Industries">
        </div>

        <h1 class="text-2xl font-bold text-center text-white mb-1 tracking-tight title-glow">Radhu Industries</h1>
        <p class="text-center text-slate-400 text-sm mb-8 font-light tracking-wide"> Stock Management</p>

        {% if form.errors %}
        <div class="error-box mb-6">
            <i class="fas fa-shield-alt text-red-400"></i>
            <span>Invalid credentials. Only authorized officials allowed.</span>
        </div>
        {% endif %}

        <form method="post" class="space-y-5">
            {% csrf_token %}
            <div class="input-group relative">
                <i class="fas fa-user input-icon"></i>
                <input type="text" name="username" required autofocus
                    class="login-input"
                    placeholder="Official Username">
            </div>
            <div class="input-group relative">
                <i class="fas fa-lock input-icon"></i>
                <input type="password" name="password" required
                    class="login-input"
                    placeholder="••••••••">
            </div>
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt mr-2"></i> Authorized Login
            </button>
        </form>

        <div class="auth-badge">
            <i class="fas fa-shield-alt"></i> ONLY FOR AUTHORIZED OFFICIALS
        </div>
    </div>
</div>

<script>
// Generate premium floating particles
(function() {
    const container = document.getElementById('particles-container');
    const count = 50;
    for (let i = 0; i < count; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const size = Math.random() * 5 + 2;
        particle.style.width = size + 'px';
        particle.style.height = size + 'px';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDuration = (Math.random() * 20 + 15) + 's';
        particle.style.animationDelay = (Math.random() * 20) + 's';
        container.appendChild(particle);
    }
})();
</script>
{% endblock %}
